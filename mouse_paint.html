<!-- mouse_paint.html - Рисовалка с мышкой на JavaScript (Canvas) -->
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🖌️ MousePaint - JavaScript</title>
    <style>
        * { box-sizing: border-box; user-select: none; }
        body { margin: 0; background: #2c3e50; display: flex; justify-content: center; align-items: center; min-height: 100vh; font-family: system-ui; }
        .container { background: #ecf0f1; padding: 20px; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
        .toolbar { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 12px; align-items: center; }
        .toolbar button { padding: 6px 12px; border: none; border-radius: 6px; background: #3498db; color: white; cursor: pointer; }
        .toolbar button:hover { background: #2980b9; }
        .toolbar input[type="color"] { width: 40px; height: 40px; border: none; cursor: pointer; }
        .toolbar input[type="range"] { width: 100px; }
        .canvas-wrapper { border: 2px solid #bdc3c7; border-radius: 8px; background: white; }
        canvas { display: block; cursor: crosshair; }
        .status { margin-top: 10px; display: flex; justify-content: space-between; font-size: 14px; color: #2c3e50; }
    </style>
</head>
<body>
<div class="container">
    <h2 style="margin-top:0;">🖌️ MousePaint · JS</h2>
    <div class="toolbar">
        <button id="brushBtn">🖌️ Кисть</button>
        <button id="eraserBtn">🧽 Ластик</button>
        <input type="color" id="colorPicker" value="#000000">
        <label>Толщина: <input type="range" id="sizeSlider" min="1" max="20" value="5"></label>
        <button id="undoBtn">↩️ Отменить</button>
        <button id="redoBtn">↪️ Повторить</button>
        <button id="clearBtn">🗑️ Очистить</button>
        <button id="saveBtn">💾 Сохранить</button>
    </div>
    <div class="canvas-wrapper">
        <canvas id="canvas" width="800" height="600"></canvas>
    </div>
    <div class="status">
        <span>Инструмент: <span id="toolDisplay">Кисть</span></span>
        <span>Размер: <span id="sizeDisplay">5</span></span>
    </div>
</div>
<script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const colorPicker = document.getElementById('colorPicker');
    const sizeSlider = document.getElementById('sizeSlider');

    let isDrawing = false;
    let lastX = 0, lastY = 0;
    let tool = 'brush';
    let color = '#000000';
    let size = 5;
    let undoStack = [];
    let redoStack = [];
    const MAX_UNDO = 20;

    function init() {
        ctx.fillStyle = '#ffffff';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        pushUndo();
        updateDisplay();
    }

    function pushUndo() {
        undoStack.push(canvas.toDataURL());
        if (undoStack.length > MAX_UNDO) undoStack.shift();
        redoStack = [];
    }

    function restoreFromDataURL(dataURL) {
        const img = new Image();
        img.onload = () => {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.drawImage(img, 0, 0);
        };
        img.src = dataURL;
    }

    function undo() {
        if (undoStack.length < 2) return;
        redoStack.push(undoStack.pop());
        restoreFromDataURL(undoStack[undoStack.length-1]);
    }

    function redo() {
        if (redoStack.length === 0) return;
        const data = redoStack.pop();
        undoStack.push(data);
        restoreFromDataURL(data);
    }

    function startDrawing(e) {
        isDrawing = true;
        const rect = canvas.getBoundingClientRect();
        lastX = e.clientX - rect.left;
        lastY = e.clientY - rect.top;
        pushUndo();
    }

    function draw(e) {
        if (!isDrawing) return;
        const rect = canvas.getBoundingClientRect();
        const x = e.clientX - rect.left;
        const y = e.clientY - rect.top;

        ctx.beginPath();
        ctx.moveTo(lastX, lastY);
        ctx.lineTo(x, y);
        ctx.strokeStyle = tool === 'eraser' ? '#ffffff' : color;
        ctx.lineWidth = size;
        ctx.lineCap = 'round';
        ctx.stroke();
        lastX = x;
        lastY = y;
    }

    function stopDrawing(e) {
        isDrawing = false;
        pushUndo();
    }

    function clearCanvas() {
        ctx.fillStyle = '#ffffff';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        pushUndo();
    }

    function saveImage() {
        const link = document.createElement('a');
        link.download = 'drawing.png';
        link.href = canvas.toDataURL('image/png');
        link.click();
    }

    function setTool(t) {
        tool = t;
        document.getElementById('toolDisplay').textContent = t === 'brush' ? 'Кисть' : 'Ластик';
    }

    function updateDisplay() {
        document.getElementById('sizeDisplay').textContent = size;
    }

    canvas.addEventListener('mousedown', startDrawing);
    canvas.addEventListener('mousemove', draw);
    canvas.addEventListener('mouseup', stopDrawing);
    canvas.addEventListener('mouseleave', stopDrawing);

    document.getElementById('brushBtn').onclick = () => setTool('brush');
    document.getElementById('eraserBtn').onclick = () => setTool('eraser');
    document.getElementById('undoBtn').onclick = undo;
    document.getElementById('redoBtn').onclick = redo;
    document.getElementById('clearBtn').onclick = clearCanvas;
    document.getElementById('saveBtn').onclick = saveImage;
    colorPicker.oninput = (e) => { color = e.target.value; };
    sizeSlider.oninput = (e) => { size = parseInt(e.target.value); updateDisplay(); };

    init();
</script>
</body>
</html>
